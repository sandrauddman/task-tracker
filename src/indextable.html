<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="/dist/main.js"></script>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <title>Task-Tracker</title>
</head>
<body>
    <header>
        <h1>Task Tracker</h1>
    </header>
    <div class="container">
    <main>
        <h2>Your to do</h2>
        <form action="onClick()" type="submitt" class="input-form">
            <div class="form-group">
                <input type="text" id="taskName" name="taskName" placeholder="Add new task">
                <input type="text" id="description" name="description" placeholder="Description">
                <select name="priority" id="priority" required>
                    <option value="empty" disabled  selected>Priority</option>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
                <button>+</button>
            </div>
        </form>
        <div class="tasks-list">
            <table>
                <thead>
                    <tr>
                        <th>Task</th>
                        <th>Description</th>
                        <th>Priority</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="task">
                            <input type="checkbox" name="taskName" id="taskName">
                            <label for="taskName">Gå med Hunden</label>
                        </td>
                        <td>gå minst 20 min</td>
                        <td>High</td>
                        <td><button type="submit">x</button></td>
                    </tr>
                    <tr>
                        <td class="task">
                            <input type="checkbox" name="taskName" id="taskName">
                            <label for="taskName">Gå med Hunden</label>
                        </td>
                        <td>gå minst 20 min</td>
                        <td>High</td>
                        <td><button type="submit">x</button></td>
                    </tr>
                    <tr>
                        <td class="task">
                            <input type="checkbox" name="taskName" id="taskName">
                            <label for="taskName">Gå med Hunden</label>
                        </td>
                        <td>gå minst 20 min</td>
                        <td>High</td>
                        <td><button type="submit">x</button></td>
                    </tr>
                </tbody>

            </table>

        </div>
        <footer>
            <p>Your remaning todos: #</p>
            <p class="quote"> Lorem ipsum qui sit et dolor</p>
        </footer>
    </main>
    </div>
</body>
</html>
